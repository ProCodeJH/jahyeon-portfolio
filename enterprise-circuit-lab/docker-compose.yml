version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: circuit-lab-postgres
    environment:
      POSTGRES_USER: circuitlab
      POSTGRES_PASSWORD: dev_password_change_in_production
      POSTGRES_DB: circuitlab
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U circuitlab']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: circuit-lab-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: circuit-lab-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_change_in_production
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: circuit-lab-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin_change_in_production;
      /usr/bin/mc mb myminio/circuit-lab-artifacts --ignore-existing;
      /usr/bin/mc policy set download myminio/circuit-lab-artifacts;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
